<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-control" content="no-Cache" />
    <title>Tests for Dynamic Proto</title>
    <link rel="stylesheet" href="../../../common/Tests/External/qunit-1.23.1.css">
    <script src="../../../common/Tests/External/sinon-2.3.8.js"></script>
    <script src="../../../common/Tests/External/require-2.3.6.js"></script>
    <script src="dynamicprototests.js"></script>

    <script>
        require.config({
            baseUrl: '../',
            paths: {
                qunit: "../../../common/Tests/External/qunit-1.23.1",
                "@nevware21/ts-utils": "../../../node_modules/@nevware21/ts-utils/dist/es5/main/ts-utils"
            }
        });

        // Load core & common before channel tests
        require([
            "qunit", // Load qunit here instead of with tests, otherwise will not work
            "@nevware21/ts-utils"
        ], function (QUnit, tsUtils) {
            require.config({
                baseUrl: './'
            });

            require([
                "test/Selenium/DynamicProtoTests"
            ], function (tests) {
                QUnit.start();
                tests.runTests();
            }, function (err) {
                console.log('REQUIRE ERROR:', err.toString());
            });
        })

    </script>
</head>

<body>
    <div id="qunit"></div>
    <div id="qunit-fixture"></div>
    <div id="error-message"></div>
</body>

</html>
